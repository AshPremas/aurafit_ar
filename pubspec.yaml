name: aurafit_ar
description: "Mobile AR based virtual fitting room for small and medium fashion stores in Sri Lanka"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.10.5+9
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/frock.png
    - assets/images/redsaree.png
    - assets/images/blackshirt.png
    - assets/images/pant.png

